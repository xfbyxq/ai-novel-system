services:
  postgres:
    image: m.daocloud.io/docker.io/postgres:17
    container_name: novel_postgres_prod
    environment:
      POSTGRES_USER: novel_user
      POSTGRES_PASSWORD: novel_pass
      POSTGRES_DB: novel_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_user -d novel_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: m.daocloud.io/docker.io/redis:6-alpine
    container_name: novel_redis_prod
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # Neo4j 图数据库服务
  neo4j:
    image: neo4j:latest
    container_name: novel_neo4j_prod
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-novel_graph_pass}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    # 生产环境不开放外部端口，仅容器内部访问
    # ports:
    #   - "7687:7687"   # Bolt协议端口
    #   - "7474:7474"   # HTTP浏览器端口
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-novel_graph_pass} 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: novel_backend_prod
    environment:
      - DOCKER_ENV=true
      - ENCRYPTION_KEY=da0bbd2d47d9070ef3302561a9a9a72e
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=novel_user
      - DB_PASSWORD=novel_pass
      - DB_NAME=novel_system
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-sk-258842ec972f46149b7364ccffb50ed2}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen3.5-plus}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # Neo4j 图数据库配置
      - ENABLE_GRAPH_DATABASE=${ENABLE_GRAPH_DATABASE:-true}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-novel_graph_pass}
      - NEO4J_DATABASE=neo4j
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: novel_nginx_prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:

networks:
  app-network:
    driver: bridge
