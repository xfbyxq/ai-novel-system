version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: novel_backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DASHSCOPE_API_KEY=your-api-key-here
      - DASHSCOPE_MODEL=qwen-plus
      - DATABASE_URL=postgresql+asyncpg://novel_user:novel_pass@postgres:5432/novel_system
      - DATABASE_URL_SYNC=postgresql://novel_user:novel_pass@postgres:5432/novel_system
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app/backend
      - ./core:/app/core
      - ./agents:/app/agents
      - ./llm:/app/llm
      - ./workers:/app/workers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: novel_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

  postgres:
    image: m.daocloud.io/docker.io/postgres:17
    container_name: novel_postgres
    environment:
      POSTGRES_DB: novel_system
      POSTGRES_USER: novel_user
      POSTGRES_PASSWORD: novel_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_user -d novel_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: m.daocloud.io/docker.io/redis:6-alpine
    container_name: novel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: