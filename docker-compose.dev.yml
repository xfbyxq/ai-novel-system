services:
  postgres_dev:
    image: m.daocloud.io/docker.io/postgres:17
    container_name: novel_postgres_dev
    environment:
      POSTGRES_USER: novel_user
      POSTGRES_PASSWORD: novel_pass
      POSTGRES_DB: novel_system
    ports:
      - "5436:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_user -d novel_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  redis_dev:
    image: m.daocloud.io/docker.io/redis:6-alpine
    container_name: novel_redis_dev
    ports:
      - "6382:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dev-network

  # Neo4j 图数据库服务
  neo4j_dev:
    image: neo4j:latest
    container_name: novel_neo4j_dev
    environment:
      - NEO4J_AUTH=neo4j/novel_graph_pass
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
    ports:
      - "7688:7687"   # Bolt协议端口
      - "7475:7474"   # HTTP浏览器端口
    volumes:
      - neo4j_data_dev:/data
      - neo4j_logs_dev:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p novel_graph_pass 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - dev-network

  backend_dev:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: novel_backend_dev
    working_dir: /app
    environment:
      - DOCKER_ENV=dev
      - DB_HOST=postgres_dev
      - DB_PORT=5432
      - DB_USER=novel_user
      - DB_PASSWORD=novel_pass
      - DB_NAME=novel_system
      - REDIS_URL=redis://redis_dev:6379/0
      - CELERY_BROKER_URL=redis://redis_dev:6379/1
      - CELERY_RESULT_BACKEND=redis://redis_dev:6379/2
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-sk-your-key-here}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen3.5-plus}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32char_default_key_12345678901234}
      # Neo4j 图数据库配置
      - ENABLE_GRAPH_DATABASE=${ENABLE_GRAPH_DATABASE:-true}
      - NEO4J_URI=bolt://neo4j_dev:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=novel_graph_pass
      - NEO4J_DATABASE=neo4j
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:cached
    depends_on:
      postgres_dev:
        condition: service_healthy
      redis_dev:
        condition: service_healthy
      neo4j_dev:
        condition: service_healthy
    networks:
      - dev-network
    command: >
      bash -c "python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"

  # 前端开发服务
  frontend_dev:
    image: m.daocloud.io/docker.io/node:20-alpine
    container_name: novel_frontend_dev
    working_dir: /app
    environment:
      - API_PROXY_TARGET=http://backend_dev:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules_dev:/app/node_modules
    depends_on:
      - backend_dev
    networks:
      - dev-network
    command: >
      sh -c "npm ci && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data_dev:
  redis_data_dev:
  neo4j_data_dev:
  neo4j_logs_dev:
  frontend_node_modules_dev:

networks:
  dev-network:
    name: novel_dev_network
    driver: bridge
