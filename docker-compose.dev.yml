services:
  postgres_dev:
    image: m.daocloud.io/docker.io/postgres:17
    container_name: novel_postgres_dev
    environment:
      POSTGRES_USER: novel_user
      POSTGRES_PASSWORD: novel_pass
      POSTGRES_DB: novel_system
    ports:
      - "5436:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_user -d novel_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  redis_dev:
    image: m.daocloud.io/docker.io/redis:6-alpine
    container_name: novel_redis_dev
    ports:
      - "6382:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dev-network

  backend_dev:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: novel_backend_dev
    working_dir: /app
    environment:
      - DOCKER_ENV=dev
      - DB_HOST=postgres_dev
      - DB_PORT=5432
      - DB_USER=novel_user
      - DB_PASSWORD=novel_pass
      - DB_NAME=novel_system
      - REDIS_URL=redis://redis_dev:6379/0
      - CELERY_BROKER_URL=redis://redis_dev:6379/1
      - CELERY_RESULT_BACKEND=redis://redis_dev:6379/2
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-sk-your-key-here}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen3.5-plus}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32char_default_key_12345678901234}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:cached
    depends_on:
      postgres_dev:
        condition: service_healthy
      redis_dev:
        condition: service_healthy
    networks:
      - dev-network
    command: >
      bash -c "python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  dev-network:
    name: novel_dev_network
    driver: bridge
