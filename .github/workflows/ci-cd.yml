name: AI Novel System CI/CD

on:
  # 触发条件
  push:
    branches: [ "1.1.0", "main", "develop" ]
  pull_request:
    branches: [ "1.1.0", "main", "develop" ]
  # 手动触发
  workflow_dispatch:

env:
  # 环境变量
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  DOCKER_COMPOSE_FILE: 'docker-compose-cn.yml'

jobs:
  # 1. 代码质量检查
  code-quality:
    name: 🧹 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          
      - name: 🔍 Code linting (Python)
        if: hashFiles('**/*.py') != ''
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          
      - name: 🧪 Code formatting check
        if: hashFiles('**/*.py') != ''
        run: |
          pip install black
          black --check .
          
      - name: 📝 Code documentation check
        if: hashFiles('**/*.py') != ''
        run: |
          pip install pydocstyle
          pydocstyle .

  # 2. 单元测试
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest pytest-cov
          
      - name: 🏃 Run unit tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ --cov=. --cov-report=xml --cov-report=html
          else
            echo "No tests directory found, skipping unit tests"
          fi
          
      - name: 📊 Upload coverage to Codecov
        if: hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # 3. Docker 构建和测试
  docker-build:
    name: 🐳 Docker Build & Test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: xfbyxq/ai-novel-system
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            
      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: 🧪 Test Docker container
        if: hashFiles('docker-compose-cn.yml') != ''
        run: |
          docker-compose -f ${{ env.DOCKER_COMPOSE_FILE }} config
          echo "Docker Compose configuration is valid"

  # 4. 安全扫描
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🛡️ Dependency vulnerability scan
        uses: advanced-security/dependency-scanning-action@v1
        with:
          languages: python,javascript
          
      - name: 🕵️ Static code analysis
        uses: github/codeql-action/init@v3
        with:
          languages: python,javascript
          
      - name: 🏃 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # 5. 部署（仅在 main 分支）
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/1.1.0'
    environment: production
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: xfbyxq/ai-novel-system
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha
            
      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: 📢 Notify deployment success
        run: |
          echo "✅ Successfully deployed ai-novel-system version ${{ github.sha }}"
          echo "📦 Docker image pushed to Docker Hub"
          echo "🔗 Repository: https://github.com/xfbyxq/ai-novel-system"

  # 6. 通知
  notify:
    name: 📬 Notification
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, docker-build, security-scan]
    if: always()
    steps:
      - name: 📊 Generate summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Jobs Completed**: 5/6" >> $GITHUB_STEP_SUMMARY