services:
  postgres:
    image: m.daocloud.io/docker.io/postgres:17
    container_name: novel_postgres
    environment:
      POSTGRES_USER: novel_user
      POSTGRES_PASSWORD: novel_pass
      POSTGRES_DB: novel_system
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_user -d novel_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: m.daocloud.io/docker.io/redis:6-alpine
    container_name: novel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/
    container_name: novel_backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=novel_user
      - DB_PASSWORD=novel_pass
      - DB_NAME=novel_system
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_MODEL=qwen3.5-plus
      - DASHSCOPE_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - DOCKER_ENV=true
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32char_default_key_12345678901234}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./core:/app/core
      - ./agents:/app/agents
      - ./llm:/app/llm
      - ./workers:/app/workers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      app-network:
        aliases:
          - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NPM_REGISTRY=https://registry.npmmirror.com
    container_name: novel_frontend
    environment:
      - API_PROXY_TARGET=http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
